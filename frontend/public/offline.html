<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Sawta Guest House</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #faf9f6; color: #0f172a; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; text-align: center; padding: 24px; }
      .badge { width: 84px; height: 84px; border-radius: 24px; background: #0f172a; color: #d4af37; font-family: Georgia, serif; font-size: 48px; font-weight: 700; display: grid; place-items: center; margin: 0 auto 20px; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { color: #64748b; max-width: 360px; line-height: 1.6; }
      button { margin-top: 18px; background: #d4af37; color: #0f172a; border: 0; font-weight: 700; padding: 12px 26px; border-radius: 10px; font-size: 14px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div>
      <div class="badge">S</div>
      <h1>You're offline</h1>
      <p>Sawta Guest House can't reach the internet right now. Please check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
